<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <title>Poutine Quiz</title>

        <base href="/" />

        <!-- Responsive -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Couleur du navigateur / PWA -->
        <meta name="theme-color" content="#000000" />
        <meta name="description" content="Poutine Quiz – Le petit cousin du Burger Quiz !" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="mobile-web-app-capable" content="yes" />

        <!-- Favicon & Manifest -->
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="manifest" href="manifest.json" />

        <!-- Google Fonts (optionnel si tu gardes Roboto ailleurs) -->
        <link rel="preconnect" href="https://fonts.gstatic.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
            rel="stylesheet" />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />

        <!-- Preload des polices locales importantes -->
        <link
            rel="preload"
            href="./assets/fonts/HooliganJF.ttf"
            as="font"
            type="font/ttf"
            crossorigin />
        <link
            rel="preload"
            href="./assets/fonts/horseshoeslemonade.ttf"
            as="font"
            type="font/ttf"
            crossorigin />
    </head>
    <body>
        <!-- Conteneur global pour un layout centré et fluide -->
        <div class="app-container">
            <app-root></app-root>
        </div>
    </body>
</html>
