<mat-accordion>
    <!-- TEAMS MANAGEMENT -->
    <mat-expansion-panel>
        <mat-expansion-panel-header>
            <mat-panel-title>Teams Management</mat-panel-title>
        </mat-expansion-panel-header>

        <div class="team-list">
            <mat-card class="team-card" *ngFor="let team of teams">
                <div class="team-header">
                    <mat-icon class="status" [ngClass]="team.logged ? 'online' : 'offline'">
                        {{ team.logged ? "wifi" : "wifi_off" }}
                    </mat-icon>

                    <h3>{{ team.name }}</h3>

                    <div class="team-actions">
                        <button
                            mat-icon-button
                            color="warn"
                            *ngIf="team.logged"
                            (click)="onDisconnect(team.name)">
                            <mat-icon>logout</mat-icon>
                        </button>

                        <button mat-icon-button color="warn" (click)="onEject(team.name)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    </div>
                </div>

                <div class="team-groups">
                    <div class="group-control">
                        <span>Round 1</span>
                        <button mat-mini-fab (click)="onChangeGroup(1, team.name, team.group1 - 1)">
                            <mat-icon>remove</mat-icon>
                        </button>
                        <span class="group-value">{{ team.group1 }}</span>
                        <button mat-mini-fab (click)="onChangeGroup(1, team.name, team.group1 + 1)">
                            <mat-icon>add</mat-icon>
                        </button>
                    </div>

                    <div class="group-control">
                        <span>Round 2</span>
                        <button mat-mini-fab (click)="onChangeGroup(2, team.name, team.group2 - 1)">
                            <mat-icon>remove</mat-icon>
                        </button>
                        <span class="group-value">{{ team.group2 }}</span>
                        <button mat-mini-fab (click)="onChangeGroup(2, team.name, team.group2 + 1)">
                            <mat-icon>add</mat-icon>
                        </button>
                    </div>
                </div>
            </mat-card>
        </div>
    </mat-expansion-panel>

    <!-- MENU DISTRIBUTION -->
    <mat-expansion-panel *ngIf="menuDistribution.length > 0">
        <mat-expansion-panel-header>
            <mat-panel-title>Menus Attribution</mat-panel-title>
        </mat-expansion-panel-header>

        <div class="menu-list">
            <!-- ROUND 1 -->
            <h2 class="round-title">Round 1</h2>

            <ng-container *ngFor="let menu of menuDistribution">
                <mat-card class="menu-card" *ngIf="menu.round === 1">
                    <h3>Menu {{ menu.menuNb }}</h3>

                    <div class="menu-control">
                        <button
                            mat-mini-fab
                            (click)="
                                onChangeMenuGroup(menu.menuNb, menu.round, menu.teamGroup - 1)
                            ">
                            <mat-icon>remove</mat-icon>
                        </button>

                        <span class="group-value">{{ menu.teamGroup }}</span>

                        <button
                            mat-mini-fab
                            (click)="
                                onChangeMenuGroup(menu.menuNb, menu.round, menu.teamGroup + 1)
                            ">
                            <mat-icon>add</mat-icon>
                        </button>
                    </div>
                </mat-card>
            </ng-container>

            <h2 class="round-title">Round 2</h2>

            <ng-container *ngFor="let menu of menuDistribution">
                <mat-card class="menu-card" *ngIf="menu.round === 2">
                    <h3>Menu {{ menu.menuNb }}</h3>

                    <div class="menu-control">
                        <button
                            mat-mini-fab
                            (click)="
                                onChangeMenuGroup(menu.menuNb, menu.round, menu.teamGroup - 1)
                            ">
                            <mat-icon>remove</mat-icon>
                        </button>

                        <span class="group-value">{{ menu.teamGroup }}</span>

                        <button
                            mat-mini-fab
                            (click)="
                                onChangeMenuGroup(menu.menuNb, menu.round, menu.teamGroup + 1)
                            ">
                            <mat-icon>add</mat-icon>
                        </button>
                    </div>
                </mat-card>
            </ng-container>
        </div>
    </mat-expansion-panel>
</mat-accordion>
